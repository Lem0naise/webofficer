<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indy Campaign Video</title>
  <style>

@import url('https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Finger Paint" , sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-size: 25px;
    }

    .container {
      width: min(1200px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    video {
      width: 100%;
      max-height: 80vh;
      border: 4px solid #fff;
      background: #000;
    }

    .actions {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 700;
      text-align: center;
      min-width: 220px;
    }

    .btn-vote {
      background: #e11d48;
      color: #fff;
      font-size: 40px;
    }

    .btn-work {
      background: #2563eb;
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="container">

    warning flashing lights
    <video controls>
      <source src="ecssnew.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="actions">
      <a id="vote-button" class="btn btn-vote" href="https://society.ecs.soton.ac.uk/elections" target="_blank" rel="noopener noreferrer">Support Indy</a>
<a class="btn btn-work" href="https://indigo.spot" target="_blank" rel="noopener noreferrer">View My Actual Work</a>

<p id="voting-disclaimer">(voting opens thursday 19th)</p>

<script>
  (function() {
    // March 19, 2026, at 20:30 (8:30 PM)
    // parameters: (year, monthIndex, day, hours, minutes)
    const electionDay = new Date(2026, 2, 19, 20, 30); 
    let now = new Date();

    if (now >= electionDay) {
      const btn = document.getElementById('vote-button');
      const disclaimer = document.getElementById('voting-disclaimer');
      
      if (btn) btn.textContent = 'Vote for Indy';
      if (disclaimer) {
          disclaimer.style.display = 'none';
      }
    }
})();
</script>
    </div>
  </main>
</body>
</html>
